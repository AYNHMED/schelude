<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schelude</title>
<style>
  :root {
  --bg: #03000A;
  --surface: #0A0612;
  --surface-2: #120D1E;
  --border: rgba(168, 85, 247, 0.12);
  --border-bright: rgba(168, 85, 247, 0.35);
  --text: #F0E6FF;
  --muted: #6B5B8A;
  --accent: #A855F7;
  --accent-glow: rgba(168, 85, 247, 0.2);
  --accent-2: #7C3AED;
  --red: #F75A5A;
  --green: #3DD68C;
  --yellow: #F5A524;
  --teal: #2DD4BF;
  --purple-bright: #C084FC;
  --purple-deep: #6D28D9;
  --radius: 10px;
  --radius-sm: 6px;
  --font: 'SF Mono', 'Fira Code', 'Courier New', monospace;
  --card-padding: 14px;
  --card-gap: 12px;
  --glass-bg: rgba(10, 6, 18, 0.8);
  --glass-border: rgba(168, 85, 247, 0.18);
  --glass-blur: blur(20px);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(192,132,252,0.06);
}
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  
  
  
  .app-brand { padding: 24px 20px 4px; font-weight: 900; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; position: relative; display: flex; align-items: center; }
  .brand-s { color: var(--accent); text-shadow: 0 0 12px var(--accent), 0 0 24px var(--accent-glow); font-size: 22px; animation: glitch 4s infinite; }
  .brand-rest { color: var(--text); letter-spacing: 4px; }
  .brand-author { color: var(--accent); font-size: 10px; opacity: 0.8; }
  .app-version { padding: 0 20px 20px; font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  
  @keyframes glitch { 0%, 90%, 100% { text-shadow: 0 0 12px var(--accent), 0 0 24px var(--accent-glow); transform: none; } 92% { text-shadow: -2px 0 var(--red), 2px 0 var(--teal); transform: translateX(1px); } 94% { text-shadow: 2px 0 var(--red), -2px 0 var(--teal); transform: translateX(-1px); } 96% { text-shadow: 0 0 12px var(--accent), 0 0 24px var(--accent-glow); transform: none; } }
  
  @keyframes scan { from { top: 0; opacity: 1; } to { top: 100%; opacity: 0; } }

  
  .nav { display: flex; flex-direction: column; padding: 0 12px; gap: 4px; }
  .nav-item { padding: 10px 12px; border-radius: var(--radius-sm); color: var(--muted); cursor: pointer; font-weight: bold; transition: all 0.1s; display: flex; align-items: center; gap: 8px; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; position: relative; overflow: hidden; }
  .nav-item::before { content: '>'; color: transparent; font-weight: bold; transition: color 0.1s; }
  .nav-item::after { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; background: linear-gradient(90deg, var(--accent-glow), transparent); transition: width 0.3s; pointer-events: none; }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item:hover::after { width: 100%; }
  .nav-item.active { color: var(--accent); border-bottom: 1px solid var(--accent); border-radius: 0; padding-bottom: 9px; }
  .nav-item.active::before { color: var(--accent); }
  
  .project-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; box-shadow: 0 0 4px currentColor; }
  .badge { background: var(--surface-2); padding: 2px 6px; border-radius: 11px; font-size: 11px; margin-left: auto; color: var(--muted); border: 1px solid var(--border); }
  
  
  
  
  .settings-btn:hover { color: var(--accent); }
  .settings-icon { font-size: 14px; animation: spin-slow 8s linear infinite; }
  @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  
  
  .agent-text { font-size: 12px; color: var(--accent); text-shadow: 0 0 5px var(--accent-glow); display: flex; align-items: center; }
  .agent-cursor { display: inline-block; width: 6px; height: 12px; background: var(--accent); margin-left: 4px; animation: blink 1s infinite, accentPulse 3s ease infinite; }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  @keyframes accentPulse { 0%, 100% { background: var(--accent); } 50% { background: var(--accent-2); } }
  
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #content { flex: 1; display: flex; overflow: hidden; padding: 24px; gap: 24px; transition: box-shadow 0.2s; }
  #content.focus-mode { box-shadow: inset 0 0 30px var(--accent-glow); }
  
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; }
  .card-header { padding: 16px; font-size: 13px; border-bottom: 1px solid var(--border); background: var(--surface); z-index: 10; text-transform: uppercase; letter-spacing: 1px; color: var(--text); font-weight: bold; }
  
  #col-left { width: 250px; flex-shrink: 0; display: flex; flex-direction: column; }
  .calendar-grid { padding: 16px; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 10px; color: var(--muted); margin-bottom: 12px; font-weight: bold; text-transform: uppercase; }
  .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px 0; }
  .cal-day { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 32px; font-size: 12px; position: relative; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.1s, box-shadow 0.1s; color: var(--text); }
  .cal-day:hover { background: var(--surface-2); box-shadow: 0 0 8px var(--accent-glow); }
  .cal-day.other-month { opacity: 0.3; pointer-events: none; }
  .cal-day.today { box-shadow: inset 0 0 0 1px var(--accent), 0 0 10px var(--accent-glow); color: var(--accent); font-weight: bold; }
  .cal-day .dots-wrap { position: absolute; bottom: 4px; display: flex; gap: 3px; justify-content: center; width: 100%; }
  .cal-day .dot { width: 4px; height: 4px; border-radius: 50%; box-shadow: 0 0 4px currentColor; }
  
  #col-right { flex: 1; display: flex; flex-direction: column; gap: 24px; min-width: 0; }
  .list-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: var(--card-gap); }
  .empty-state { font-size: 14px; color: var(--muted); font-style: italic; }
  .view-header { font-size: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--text); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; font-size: 12px; text-transform: uppercase; transition: all 0.1s; }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

  .item-card { background: var(--surface-2); border: 1px solid var(--border); border-left: 2px solid var(--border); border-radius: var(--radius-sm); padding: var(--card-padding); display: flex; gap: 12px; align-items: flex-start; transition: all 0.1s; cursor: pointer; position: relative; }
  .item-card:hover { transform: translateY(-1px); border-color: var(--border-bright); }
  .item-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .item-header { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding-right: 16px; }
  .item-title { font-size: 15px; font-weight: bold; color: var(--text); }
  .item-meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  
  .tag-pill { display: inline-block; padding: 2px 6px; border-radius: var(--radius-sm); font-size: 11px; font-weight: bold; text-transform: uppercase; border: 1px solid; }
  .priority-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); box-shadow: 0 0 6px var(--red); display: inline-block; }
  .priority-text { color: var(--accent); font-weight: bold; margin-right: 4px; text-shadow: 0 0 4px var(--accent-glow); }
  
  .task-checkbox { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--muted); background: var(--surface); flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.1s; position: relative; }
  .task-checkbox.checked { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  .task-checkbox.checked::after { content: ''; display: block; width: 4px; height: 8px; border: solid var(--bg); border-width: 0 2px 2px 0; transform: rotate(45deg); margin-bottom: 2px; }
  
  .item-card.done .item-title { text-decoration: line-through; color: var(--muted); }
  .delete-btn { position: absolute; right: 8px; top: 8px; opacity: 0; color: var(--red); font-size: 12px; line-height: 1; transition: opacity 0.1s, filter 0.1s; cursor: pointer; font-weight: bold; z-index: 5; }
  .item-card:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { filter: brightness(1.3); }

  .task-section-header { font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; display: flex; align-items: center; gap: 8px; margin: 12px 0 4px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .task-section-header:first-child { margin-top: 0; }
  .task-project { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; font-weight: bold; }
  .task-progress { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 8px; margin-top: 2px; }
  .task-progress-bar { flex: 1; height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; border: 1px solid var(--border); }
  .task-progress-fill { height: 100%; background: var(--accent); transition: width 0.2s; box-shadow: 0 0 4px var(--accent-glow); }
  
  #input-bar { height: 80px; border-top: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; padding: 16px 24px; gap: 16px; position: relative; flex-shrink: 0; }
  #status-pill { position: absolute; top: -32px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--text); padding: 4px 12px; border-radius: var(--radius); font-size: 11px; font-weight: bold; text-transform: uppercase; box-shadow: 0 0 10px var(--accent-glow); opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  #status-pill.show { animation: pillPop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  #input-area { flex: 1; height: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-family: inherit; font-size: 13px; resize: none; outline: none; transition: all 0.1s; background: var(--surface-2); color: var(--text); }
  #input-area:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
  #submit-btn { height: 100%; padding: 0 20px; background: var(--accent); color: var(--text); border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: bold; font-family: inherit; cursor: pointer; transition: all 0.1s; }
  #submit-btn:hover { background: var(--accent-2); box-shadow: 0 0 15px var(--accent-glow); }
  #submit-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

  .full-width-container { flex: 1; display: flex; flex-direction: column; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; overflow-y: auto; animation: fadeInView 0.25s ease; }

  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal-card { background: var(--surface-2); border: 1px solid var(--border-bright); border-radius: var(--radius); padding: 24px; width: 400px; max-width: 90%; box-shadow: 0 0 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 16px; max-height: 90vh; overflow-y: auto; }
  .modal-header { font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); }
  .modal-input { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-family: inherit; font-size: 14px; resize: none; outline: none; background: var(--bg); color: var(--text); }
  .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
  .modal-select { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-family: inherit; font-size: 13px; outline: none; background: var(--bg); color: var(--text); }
  .modal-field { display: flex; flex-direction: column; gap: 4px; }
  .modal-label { font-size: 11px; text-transform: uppercase; color: var(--muted); font-weight: bold; }
  .modal-checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text); cursor: pointer; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; }
  .btn-outline { background: transparent; border: 1px solid var(--muted); color: var(--muted); padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; font-size: 12px; text-transform: uppercase; font-weight: bold; }
  .btn-outline:hover { border-color: var(--text); color: var(--text); }
  .btn-primary { background: var(--accent); border: none; color: var(--text); padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; font-size: 12px; text-transform: uppercase; font-weight: bold; }
  .btn-primary:hover { background: var(--accent-2); box-shadow: 0 0 10px var(--accent-glow); }
  
  .subtasks-list { display: flex; flex-direction: column; gap: 8px; }
  .subtask-row { display: flex; align-items: center; gap: 8px; font-size: 12px; background: var(--surface-2); padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .st-done { text-decoration: line-through; color: var(--muted); }
  .st-del { position: static; opacity: 1; font-size: 14px; padding: 4px; }
  .st-del:hover { color: var(--red); }

  .workspace-section { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
  .workspace-header { font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); }
  .workspace-desc { font-size: 11px; color: var(--muted); margin-top: -12px; }
  .workspace-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .workspace-label { font-size: 13px; font-weight: bold; }
  .workspace-divider { height: 1px; background: var(--border); margin: 0 0 24px; }
  
  .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: var(--text); box-shadow: 0 0 10px var(--accent-glow); }
  
  .button-group { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .btn-toggle { background: transparent; border: none; padding: 6px 12px; color: var(--muted); cursor: pointer; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; font-family: inherit; }
  .btn-toggle.active { background: var(--accent); color: var(--text); box-shadow: 0 0 8px var(--accent-glow); }
  
  .toggle-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface-2); padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg); transition: .2s; border-radius: 20px; border: 1px solid var(--border); }
  .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: var(--muted); transition: .2s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--accent-glow); border-color: var(--accent); }
  input:checked + .slider:before { transform: translateX(22px); background-color: var(--accent); }
  
  .list-editor { display: flex; flex-direction: column; gap: 8px; }
  .list-editor-row { display: flex; align-items: center; gap: 12px; background: var(--surface-2); padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .add-form { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .color-picker { width: 32px; height: 32px; padding: 0; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; background: transparent; }

  .habit-card { background: var(--surface-2); border: 1px solid var(--border); border-left: 2px solid var(--border); border-radius: var(--radius-sm); padding: var(--card-padding); display: flex; align-items: center; gap: 16px; margin-bottom: var(--card-gap); position: relative; }
  .habit-days { display: flex; gap: 6px; }
  .habit-day-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); border: 1px solid var(--border-bright); }
  .habit-day-dot.done { background: var(--accent); box-shadow: 0 0 4px var(--accent-glow); }
  .habit-day-dot.today { width: 12px; height: 12px; }
  .streak-badge { font-size: 12px; color: var(--accent); font-weight: bold; text-shadow: 0 0 6px var(--accent-glow); }
  .btn-habit-done { margin-left: auto; background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; font-size: 11px; font-weight: bold; white-space: nowrap; transition: 0.1s; }
  .btn-habit-done:hover { background: var(--accent-glow); }
  .btn-habit-done:disabled { opacity: 0.4; cursor: default; }
  .btn-habit-done.done-today { background: var(--accent-glow); }

  .pomodoro-widget { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; display: flex; align-items: center; gap: 24px; margin-bottom: 16px; flex-shrink: 0; }
  .pomodoro-display { font-size: 32px; font-weight: bold; color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); letter-spacing: 2px; min-width: 100px; }
  .pomodoro-mode { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .pomodoro-controls { display: flex; gap: 8px; }
  .pomodoro-session { font-size: 11px; color: var(--muted); margin-left: auto; }

  .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 16px; flex: 1; min-height: 0; }
  .matrix-quadrant { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; position: relative; animation: fadeInScale 0.3s ease forwards; }
  .matrix-header { padding: 12px 16px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .matrix-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }

  .search-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: flex-start; justify-content: center; padding-top: 15vh; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
  .search-overlay.show { opacity: 1; pointer-events: auto; }
  .search-card { background: var(--surface-2); border: 1px solid var(--border-bright); border-radius: var(--radius); width: 560px; max-width: 90%; box-shadow: 0 0 40px rgba(0,0,0,0.6); overflow: hidden; animation: searchSlideIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
  .search-input-wrap { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); gap: 12px; }
  .search-input-icon { color: var(--muted); font-size: 16px; }
  .search-input { flex: 1; background: transparent; border: none; outline: none; font-family: inherit; font-size: 15px; color: var(--text); }
  .search-results { max-height: 400px; overflow-y: auto; }
  .search-group-header { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 12px 16px 4px; font-weight: bold; }
  .search-result-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; transition: background 0.1s; }
  .search-result-item:hover { background: var(--surface); }
  .search-result-title { font-size: 13px; color: var(--text); flex: 1; }
  .search-result-meta { font-size: 11px; color: var(--muted); }
  .search-no-results { padding: 24px 16px; font-size: 13px; color: var(--muted); text-align: center; }

  #search-btn { height: 100%; padding: 0 16px; background: var(--surface-2); color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.1s; white-space: nowrap; }
  #search-btn:hover { border-color: var(--accent); color: var(--accent); }

  .energy-widget { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 12px; flex-shrink: 0; }
  .energy-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .energy-level { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
  .energy-suggestion { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .energy-tasks { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .energy-task-hint { font-size: 11px; color: var(--accent); padding: 4px 8px; background: var(--accent-glow); border-radius: var(--radius-sm); }

  /* Calendar Full CSS */
  .cal-full-header { display: flex; align-items: center; gap: 16px; padding: 20px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .cal-full-month { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; color: var(--text); min-width: 200px; text-align: center; }

  /* Settings Drawer CSS */
  .settings-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1500; opacity: 0; pointer-events: none; transition: opacity 0.3s; }

  /* Pages CSS */

function escapeHtml(unsafe) { return String(unsafe || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

function calcStreak(completions, frequency) {
  const sorted = [...completions].sort().reverse(); if (!sorted.length) return 0;
  let streak = 0; let cursor = new Date(); cursor.setHours(0,0,0,0);
  for (let i = 0; i < 100; i++) {
    const dateStr = cursor.toISOString().slice(0,10);
    if (sorted.includes(dateStr)) { streak++; cursor.setDate(cursor.getDate() - (frequency === 'weekly' ? 7 : 1)); } else break;
  }
  return streak;
}

function buildEventCard(ev, i, onRemove, onEdit) {
  const tagObj = TAG_COLORS[ev.tag] || TAG_COLORS.event;
  const dateParts = []; if (ev.time) dateParts.push(ev.time); if (ev.day) dateParts.push('Day ' + ev.day);
  const dateStr = dateParts.join(' • ');
  const titleLower = (ev.title || '').toLowerCase();
  const isPriority = titleLower.includes('urgent') || titleLower.includes('important') || titleLower.includes('critical');
  const locationStr = ev.location ? ` • 📍 ${escapeHtml(ev.location)}` : '';

  const div = document.createElement('div'); div.className = 'item-card'; div.style.borderLeftColor = tagObj.dot;
  div.onmouseenter = () => { div.style.boxShadow = `-4px 0 15px -5px ${tagObj.dot}`; }; div.onmouseleave = () => { div.style.boxShadow = 'none'; }; div.onclick = () => onEdit(i);

  div.innerHTML = `<div class="item-content"><div class="item-header">${isPriority ? '<div class="priority-dot"></div>' : ''}<div class="item-title">${escapeHtml(ev.title)}</div><div class="tag-pill" style="background: ${tagObj.bg}; color: ${tagObj.text}; border-color: ${tagObj.border}">${escapeHtml(ev.tag || 'event')}</div></div>${(dateStr || locationStr) ? `<div class="item-meta">${escapeHtml(dateStr)}${locationStr}</div>` : ''}</div><div class="delete-btn" title="Delete">✕</div>`;
  const delBtn = div.querySelector('.delete-btn'); delBtn.onclick = (e) => { e.stopPropagation(); div.classList.add('deleting'); setTimeout(() => onRemove(i), 200); }; return div;
}

function buildGoogleEventCard(gev, onDelete) {
  const div = document.createElement('div'); div.className = 'item-card'; div.style.borderLeftColor = '#4285F4';
  div.onmouseenter = () => { div.style.boxShadow = '-4px 0 15px -5px #4285F4'; }; div.onmouseleave = () => { div.style.boxShadow = 'none'; };
  const dateStr = gev.start ? new Date(gev.start).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';
  div.innerHTML = `<div class="item-content"><div class="item-header"><div class="item-title">${escapeHtml(gev.title)}</div><div class="tag-pill" style="background: rgba(66,133,244,0.1); color: #4285F4; border-color: rgba(66,133,244,0.3);">google</div></div>${dateStr ? '<div class="item-meta">' + escapeHtml(dateStr) + '</div>' : ''}${gev.location ? '<div class="item-meta">📍 ' + escapeHtml(gev.location) + '</div>' : ''}</div><div class="delete-btn" title="Delete from Google Calendar">✕</div>`;
  const delBtn = div.querySelector('.delete-btn'); delBtn.onclick = async (e) => { e.stopPropagation(); div.classList.add('deleting'); setTimeout(() => { if (onDelete) onDelete(gev.id); }, 200); }; return div;
}

function buildTaskCard(tk, i, onToggle, onRemove, onEdit) {
  const div = document.createElement('div'); div.className = `item-card ${tk.done ? 'done' : ''}`; div.style.borderLeftColor = tk.done ? 'var(--muted)' : 'var(--accent)'; div.onclick = () => onEdit(i);
  const today = new Date(); let isPriority = false;
  if (tk.day && parseInt(tk.day, 10) <= today.getDate()) isPriority = true; else if (tk.due && tk.due.toLowerCase().includes('today')) isPriority = true;
  if (tk.priority === 'urgent') isPriority = true;
  const dueDate = tk.due || '';
  let subtasksHtml = '';
  if (tk.subtasks && tk.subtasks.length > 0) {
    const total = tk.subtasks.length; const done = tk.subtasks.filter(s => s.done).length; const pct = (done / total) * 100;
    subtasksHtml = `<div class="task-progress"><div>${done} / ${total}</div><div class="task-progress-bar"><div class="task-progress-fill" style="width: ${pct}%"></div></div></div>`;
  }
  let projectHtml = ''; const proj = projects.find(p => p.id === (tk.project || 'inbox'));
  if (proj) projectHtml = `<div class="task-project"><div class="project-dot" style="background: ${proj.color}; color: ${proj.color}"></div> ${escapeHtml(proj.name)}</div>`;
  let recurrenceHtml = '';
  if (tk.recurrence && tk.recurrence !== 'none') { const rMap = { daily: 'Daily', weekly: 'Weekly', monthly: 'Monthly' }; recurrenceHtml = `<div style="font-size: 10px; color: var(--muted); margin-top: 2px;">↻ ${rMap[tk.recurrence]}</div>`; }

  div.innerHTML = `<div class="task-checkbox ${tk.done ? 'checked' : ''}"></div><div class="item-content"><div class="item-header">${(isPriority && !tk.done) ? '<span class="priority-text">!</span>' : ''}<div class="item-title">${escapeHtml(tk.title)}</div></div>${projectHtml} ${dueDate ? `<div class="item-meta">${escapeHtml(dueDate)}</div>` : ''} ${recurrenceHtml} ${subtasksHtml}</div><div class="delete-btn" title="Delete">✕</div>`;
  div.onmouseenter = () => { div.style.boxShadow = `-4px 0 15px -5px ${tk.done ? 'var(--muted)' : 'var(--accent)'}`; }; div.onmouseleave = () => { div.style.boxShadow = 'none'; };
  const checkbox = div.querySelector('.task-checkbox'); checkbox.onclick = (e) => { e.stopPropagation(); const ripple = document.createElement('div'); ripple.className = 'checkbox-ripple'; checkbox.appendChild(ripple); setTimeout(() => onToggle(i), 300); };
  const delBtn = div.querySelector('.delete-btn'); delBtn.onclick = (e) => { e.stopPropagation(); div.classList.add('deleting'); setTimeout(() => onRemove(i), 200); }; return div;
}

function appendTaskSections(listEl, filteredTasks, onEdit) {
  const sorted = [...filteredTasks].sort((a,b) => (a.done === b.done) ? 0 : a.done ? 1 : -1);
  const groups = {}; sorted.forEach(tk => { const pid = tk.project || 'inbox'; if (!groups[pid]) groups[pid] = []; groups[pid].push(tk); });
  let dIndex = 0;
  projects.forEach(p => {
    if (groups[p.id]) {
      const sectionHeader = document.createElement('div'); sectionHeader.className = 'task-section-header'; sectionHeader.innerHTML = `<div class="project-dot" style="background: ${p.color}; color: ${p.color}"></div> ${escapeHtml(p.name)}`; listEl.appendChild(sectionHeader);
      groups[p.id].forEach(tk => {
        const globalIndex = tasks.indexOf(tk);
        const div = buildTaskCard(tk, globalIndex, (idx) => {
          const target = tasks[idx];
          if (!target.done && target.recurrence && target.recurrence !== 'none') {
            if (target.due) { const d = new Date(target.due); if (!isNaN(d.getTime())) { if (target.recurrence === 'daily') d.setDate(d.getDate() + 1); else if (target.recurrence === 'weekly') d.setDate(d.getDate() + 7); else if (target.recurrence === 'monthly') d.setMonth(d.getMonth() + 1); target.due = d.toISOString().split('T')[0]; } }
            target.done = false; if (target.subtasks) target.subtasks.forEach(s => s.done = false); updateAgent("Recurring task reset"); showPill(`Task reset — next due ${target.due || 'soon'}`);
          } else { target.done = !target.done; updateAgent(target.done ? "Marked task as done" : "Marked task as undone"); }
          saveState(); renderView();
        }, (idx) => { tasks.splice(idx, 1); saveState(); updateAgent("Removed task"); renderView(); }, onEdit);
        div.style.animation = 'fadeSlideIn 0.3s ease forwards'; div.style.opacity = '0'; div.style.animationDelay = (dIndex * 0.03) + 's';
        listEl.appendChild(div);
        dIndex++;
      });
    }
  });
}

function renderEvents() {
  const list = document.getElementById('events-list'); if (!list) return;
  if (events.length === 0 && googleEvents.length === 0) { list.innerHTML = '<div class="empty-state">No events yet — type something below</div>'; return; }
  list.innerHTML = ''; let dIndex = 0;
  events.forEach((ev, i) => { const div = buildEventCard(ev, i, (idx) => { events.splice(idx, 1); saveState(); updateAgent("Removed event"); renderView(); }, openEditEvent); div.style.animation = 'fadeSlideIn 0.3s ease forwards'; div.style.opacity = '0'; div.style.animationDelay = (dIndex++ * 0.03) + 's'; list.appendChild(div); });
  if (googleConnected) { googleEvents.forEach(gev => { const div = buildGoogleEventCard(gev, deleteGoogleEvent); div.style.animation = 'fadeSlideIn 0.3s ease forwards'; div.style.opacity = '0'; div.style.animationDelay = (dIndex++ * 0.03) + 's'; list.appendChild(div); }); }
}

function renderTasks() {
  const list = document.getElementById('tasks-list'); if (!list) return;
  if (tasks.length === 0) { list.innerHTML = '<div class="empty-state">No tasks yet</div>'; return; }
  list.innerHTML = ''; appendTaskSections(list, tasks, openEditTask);
}

function renderCalendarMini() {
  const calDays = document.getElementById('cal-days'); if (!calDays) return;
  const now = new Date(); const year = now.getFullYear(); const month = now.getMonth(); const todayDate = now.getDate();
  const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month + 1, 0).getDate(); const prevMonthDays = new Date(year, month, 0).getDate();
  const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"]; const currentMonthName = monthNames[month];
  calDays.innerHTML = '';
  
  const eventDays = new Set();
  events.forEach(ev => {
    if (ev.day) eventDays.add(parseInt(ev.day, 10));
    else if (ev.date) { const d = new Date(ev.date); if (!isNaN(d.getTime()) && d.getMonth() === month && d.getFullYear() === year) eventDays.add(d.getDate()); else { const match = String(ev.date).match(/\b(\d{1,2})\b/); if (match) eventDays.add(parseInt(match[1], 10)); } }
  });
  const googleEventDays = new Set();
  if (googleConnected) { googleEvents.forEach(gev => { if (gev.start) { const d = new Date(gev.start); if (!isNaN(d.getTime()) && d.getMonth() === month && d.getFullYear() === year) googleEventDays.add(d.getDate()); } }); }

  for (let i = firstDay - 1; i >= 0; i--) { const d = document.createElement('div'); d.className = 'cal-day other-month'; d.textContent = prevMonthDays - i; calDays.appendChild(d); }
  for (let i = 1; i <= daysInMonth; i++) {
    const d = document.createElement('div'); d.className = `cal-day ${i === todayDate ? 'today' : ''}`; d.textContent = i;
    const dotsWrap = document.createElement('div'); dotsWrap.className = 'dots-wrap';
    if (eventDays.has(i)) {
      const dot = document.createElement('div'); dot.className = 'dot';
      const evOnDay = events.find(e => e.day && parseInt(e.day,10) === i);
      if (evOnDay) { const tObj = TAG_COLORS[evOnDay.tag] || TAG_COLORS.event; dot.style.color = tObj.dot; dot.style.background = tObj.dot; } else { dot.style.color = 'var(--text)'; dot.style.background = 'var(--text)'; }
      dotsWrap.appendChild(dot);
    }
    if (googleEventDays.has(i)) { const dot = document.createElement('div'); dot.className = 'dot'; dot.style.color = '#4285F4'; dot.style.background = '#4285F4'; dotsWrap.appendChild(dot); }
    if (dotsWrap.children.length > 0) d.appendChild(dotsWrap);
    d.onclick = () => { openModal(i, currentMonthName); }; calDays.appendChild(d);
  }
  const totalCells = firstDay + daysInMonth; let nextDay = 1;
  for (let i = totalCells; i < 42; i++) { const d = document.createElement('div'); d.className = 'cal-day other-month'; d.textContent = nextDay++; calDays.appendChild(d); }
}

function renderPomodoro() {
  const display = document.getElementById('pomodoro-display'); const modeLbl = document.getElementById('pomodoro-mode'); const sessLbl = document.getElementById('pomodoro-session');
  if (!display) return;
  const m = Math.floor(pomodoroTimeLeft / 60); const s = pomodoroTimeLeft % 60; display.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  if (pomodoroMode === 'work') { modeLbl.textContent = 'DEEP WORK'; display.style.color = 'var(--accent)'; }
  else if (pomodoroMode === 'short') { modeLbl.textContent = 'SHORT BREAK'; display.style.color = 'var(--green)'; }
  else { modeLbl.textContent = 'LONG BREAK'; display.style.color = 'var(--teal)'; }
  sessLbl.textContent = `Session ${pomodoroSession} of 4`;
}

function startPomodoro() {
  clearInterval(pomodoroInterval);
  pomodoroInterval = setInterval(() => {
    pomodoroTimeLeft--;
    if (pomodoroTimeLeft <= 0) {
      pomodoroRunning = false; clearInterval(pomodoroInterval); showPill("Session complete — take a break");
      if (pomodoroMode === 'work') { if (pomodoroSession % 4 === 0) { pomodoroMode = 'long'; pomodoroTimeLeft = 15 * 60; } else { pomodoroMode = 'short'; pomodoroTimeLeft = 5 * 60; } } 
      else { pomodoroMode = 'work'; pomodoroTimeLeft = 25 * 60; pomodoroSession++; }
      const btn = document.getElementById('btn-pomo-start'); if (btn) btn.textContent = 'Start';
    }
    renderPomodoro();
  }, 1000);
}

function triggerPageAutosave() {
  clearTimeout(pageAutosaveTimer);
  pageAutosaveTimer = setTimeout(() => {
    const page = pages.find(p => p.id === currentPageId); if (!page) return;
    const titleEl = document.getElementById('page-title'); if (titleEl) page.title = titleEl.innerText;
    const blocksCont = document.getElementById('page-blocks-container');
    if (blocksCont) {
      const domBlocks = blocksCont.querySelectorAll('.page-block');
      domBlocks.forEach(d => {
        const id = d.getAttribute('data-id'); const b = page.blocks.find(x => x.id === id);
        if (b && b.type !== 'divider') { const contentEl = d.querySelector('.block-content'); if (contentEl) b.content = contentEl.innerText; }
      });
    }
    page.updatedAt = new Date().toISOString(); savePages();
  }, 500);
}


function navigateTo(view, opts) {
  if (view === currentView) return;
  const content = document.getElementById('content');
  
  content.style.animation = 'pageExitLeft 0.25s cubic-bezier(0.4,0,1,1) forwards';
  
  setTimeout(() => {
    currentView = view;
    taskFilterProject = view === 'tasks' ? taskFilterProject : null;
    updateTopNav();
    renderView();
    content.style.animation = 'pageEnterRight 0.3s cubic-bezier(0.16,1,0.3,1) forwards';
    setTimeout(() => { content.style.animation = ''; }, 310);
  }, 200);
}

function updateTopNav() {
  const groups = { planning: ['planner','calendar','upcoming'], tasks: ['tasks','focus','matrix'], life: ['habits','pages'] };
  document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('active'));
  document.querySelectorAll('.nav-dd-item').forEach(el => el.classList.remove('active'));
  
  for (const [group, views] of Object.entries(groups)) {
    if (views.includes(currentView)) {
      document.getElementById('ng-' + group)?.classList.add('active');
    }
  }
  document.querySelectorAll('.nav-dd-item').forEach(el => {
    if (el.getAttribute('data-view') === currentView) el.classList.add('active');
  });
}

    const list = document.getElementById('tasks-list');

  } else if (currentView === 'focus') {
    const today = new Date(); const currentDay = today.getDate(); const hr = today.getHours();
    let energyText = "Rest window — avoid scheduling deep work"; let energyLevel = "LOW ENERGY"; let energyDot = "var(--muted)";
    if (hr >= 6 && hr < 9) { energyText = "Morning peak — ideal for deep work and complex tasks"; energyLevel = "MORNING PEAK"; energyDot = "var(--green)"; }

    else if (hr >= 12 && hr < 14) { energyText = "Post-lunch dip — good for admin, emails, or light tasks"; energyLevel = "POST-LUNCH DIP"; energyDot = "var(--yellow)"; }
    else if (hr >= 14 && hr < 16) { energyText = "Recovery window — meetings and collaborative work"; energyLevel = "RECOVERY"; energyDot = "var(--yellow)"; }
    else if (hr >= 16 && hr < 18) { energyText = "Second wind — creative work and planning"; energyLevel = "SECOND WIND"; energyDot = "var(--green)"; }
    else if (hr >= 18 && hr < 22) { energyText = "Wind-down — review, reflect, and light reading"; energyLevel = "WIND-DOWN"; energyDot = "var(--accent)"; }
    let suggestedHtml = ''; const pendingTasks = tasks.filter(t => !t.done);
    if (energyLevel.includes("FOCUS") || energyLevel.includes("PEAK")) { pendingTasks.filter(t => { const l = t.title.toLowerCase(); return t.tag === 'test' || t.tag === 'homework' || l.includes('study'); }).slice(0,3).forEach(t => { suggestedHtml += `<div class="energy-task-hint">→ ${escapeHtml(t.title)}</div>`; }); } 
    else if (energyLevel.includes("DIP") || energyLevel.includes("RECOVERY")) { pendingTasks.filter(t => t.project === 'inbox' || !t.project).slice(0,3).forEach(t => { suggestedHtml += `<div class="energy-task-hint">→ ${escapeHtml(t.title)}</div>`; }); } 
    else if (energyLevel.includes("WIND")) { pendingTasks.filter(t => t.tag === 'work' || t.tag === 'event').slice(0,3).forEach(t => { suggestedHtml += `<div class="energy-task-hint">→ ${escapeHtml(t.title)}</div>`; }); }

    const todayStr = today.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
    content.innerHTML = `<div class="full-width-container"><div class="view-header" style="font-size: 20px; color: var(--accent);">TODAY — ${todayStr.toUpperCase()}</div><div class="energy-widget"><div class="energy-dot" style="background: ${energyDot}; box-shadow: 0 0 6px ${energyDot};"></div><div style="flex:1;"><div class="energy-level" style="color: ${energyDot};">${energyLevel}</div><div class="energy-suggestion">${energyText}</div><div class="energy-tasks">${suggestedHtml}</div></div></div><div class="pomodoro-widget"><div style="flex:1;"><div class="pomodoro-display" id="pomodoro-display">25:00</div><div class="pomodoro-mode" id="pomodoro-mode">DEEP WORK</div></div><div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;"><div class="pomodoro-session" id="pomodoro-session">Session 1 of 4</div><div class="pomodoro-controls"><button class="btn-primary" id="btn-pomo-start">${pomodoroRunning ? 'Pause' : 'Start'}</button><button class="btn-outline" id="btn-pomo-reset">Reset</button></div></div></div><div class="list-container" id="focus-list" style="padding: 0;"></div></div>`;
    renderPomodoro();
    document.getElementById('btn-pomo-start').onclick = () => { pomodoroRunning = !pomodoroRunning; if (pomodoroRunning) startPomodoro(); else clearInterval(pomodoroInterval); document.getElementById('btn-pomo-start').textContent = pomodoroRunning ? 'Pause' : 'Start'; };
    document.getElementById('btn-pomo-reset').onclick = () => { pomodoroRunning = false; clearInterval(pomodoroInterval); document.getElementById('btn-pomo-start').textContent = 'Start'; if (pomodoroMode === 'work') pomodoroTimeLeft = 25 * 60; else if (pomodoroMode === 'short') pomodoroTimeLeft = 5 * 60; else pomodoroTimeLeft = 15 * 60; renderPomodoro(); };
    
    const list = document.getElementById('focus-list');
    const todayEvents = events.filter(e => e.day && parseInt(e.day) === currentDay);
    const todayTasks = tasks.filter(t => (t.day && parseInt(t.day) === currentDay) || (t.due && t.due.toLowerCase().includes('today')));
    if (todayEvents.length === 0 && todayTasks.length === 0) list.innerHTML = '<div class="empty-state">Nothing scheduled for today</div>';
    else {
      let dIndex = 0;
      todayEvents.forEach(ev => { const i = events.indexOf(ev); const div = buildEventCard(ev, i, (idx) => { events.splice(idx, 1); saveState(); renderView(); }, openEditEvent); div.style.animation = 'fadeSlideIn 0.3s ease forwards'; div.style.opacity = '0'; div.style.animationDelay = (dIndex++ * 0.03) + 's'; list.appendChild(div); });
      todayTasks.forEach(tk => { const i = tasks.indexOf(tk); const div = buildTaskCard(tk, i, (idx) => { tasks[idx].done = !tasks[idx].done; saveState(); renderView(); }, (idx) => { tasks.splice(idx, 1); saveState(); renderView(); }, openEditTask); div.style.animation = 'fadeSlideIn 0.3s ease forwards'; div.style.opacity = '0'; div.style.animationDelay = (dIndex++ * 0.03) + 's'; list.appendChild(div); });
    }

  } else if (currentView === 'habits') {
    const todayStr = new Date().toISOString().slice(0, 10);
    let activeHabits = habits.length; let maxStreak = 0;

    const colorSelect = document.getElementById('new-habit-color-select'); const preview = document.getElementById('habit-color-preview');
    colorSelect.onchange = () => { preview.style.background = colorSelect.value; preview.style.boxShadow = `0 0 8px ${hexToRgba(colorSelect.value, 0.5)}`; };

    document.getElementById('btn-add-habit').onclick = () => {
      const name = document.getElementById('new-habit-name').value.trim(); const freq = document.getElementById('new-habit-freq').value; const selectedColor = colorSelect.value;
      if (name) { habits.push({ id: crypto.randomUUID() || Date.now().toString(), name, color: selectedColor, frequency: freq, completions: [], streak: 0, createdAt: new Date().toISOString() }); saveHabits(); renderView(); }
    };

    const list = document.getElementById('habits-list');
    if (habits.length === 0) list.innerHTML = '<div class="empty-state">No habits yet</div>';
    
    habits.forEach((h, i) => {
      const doneToday = h.completions.includes(todayStr); let dotsHtml = '';
      for (let d = 6; d >= 0; d--) { const cursor = new Date(); cursor.setDate(cursor.getDate() - d); const dStr = cursor.toISOString().slice(0,10); const isDone = h.completions.includes(dStr); const isToday = d === 0; dotsHtml += `<div class="habit-day-dot ${isDone ? 'done' : ''} ${isToday ? 'today' : ''}" ${isDone ? `style="background: ${h.color}; box-shadow: 0 0 4px ${h.color}80;"` : ''}></div>`; }
      const div = document.createElement('div'); div.className = 'habit-card'; div.style.borderLeftColor = h.color; div.style.animation = 'fadeSlideIn 0.3s ease forwards'; div.style.opacity = '0'; div.style.animationDelay = (i * 0.05) + 's';
      div.innerHTML = `<div style="flex: 1;"><div style="font-weight: bold; font-size: 14px; margin-bottom: 4px;">${escapeHtml(h.name)} <span style="font-size: 10px; color: var(--muted); font-weight: normal; margin-left: 8px; text-transform:uppercase;">${h.frequency}</span></div><div class="streak-badge" style="color: ${h.color}; text-shadow: 0 0 6px ${h.color}80;">🔥 ${h.streak} day streak</div></div><div class="habit-days">${dotsHtml}</div><button class="btn-habit-done ${doneToday ? 'done-today' : ''}" style="border-color: ${h.color}; color: ${doneToday ? 'var(--bg)' : h.color}; background: ${doneToday ? h.color : 'transparent'};" ${doneToday ? 'disabled' : ''}>${doneToday ? '✓ Done' : 'Mark Done Today'}</button><div class="delete-btn" style="right: 12px;">✕</div>`;
      const btn = div.querySelector('.btn-habit-done'); if (!doneToday) { btn.onclick = () => { h.completions.push(todayStr); h.streak = calcStreak(h.completions, h.frequency); saveHabits(); if (h.streak > 3) { const badge = div.querySelector('.streak-badge'); if (badge) badge.classList.add('hot'); } setTimeout(() => { renderView(); }, 500); showPill(`Habit logged — ${h.streak} day streak`); }; }
      div.querySelector('.delete-btn').onclick = () => { div.classList.add('deleting'); setTimeout(() => { habits = habits.filter(x => x.id !== h.id); saveHabits(); renderView(); }, 200); };
      list.appendChild(div);
    });

  } else if (currentView === 'matrix') {
    content.innerHTML = `<div class="full-width-container" style="padding-bottom: 0;"><div class="view-header">EISENHOWER MATRIX</div><div class="matrix-grid"><div class="matrix-quadrant" style="border-top: 3px solid var(--red);"><div class="matrix-header"><span>Urgent & Important</span> <span class="badge" id="q1-badge">0</span></div><div class="matrix-list" id="q1-list"></div></div><div class="matrix-quadrant" style="border-top: 3px solid var(--accent);"><div class="matrix-header"><span>Not Urgent & Important</span> <span class="badge" id="q2-badge">0</span></div><div class="matrix-list" id="q2-list"></div></div><div class="matrix-quadrant" style="border-top: 3px solid var(--yellow);"><div class="matrix-header"><span>Urgent & Not Important</span> <span class="badge" id="q3-badge">0</span></div><div class="matrix-list" id="q3-list"></div></div><div class="matrix-quadrant" style="border-top: 3px solid var(--muted);"><div class="matrix-header"><span>Not Urgent & Not Important</span> <span class="badge" id="q4-badge">0</span></div><div class="matrix-list" id="q4-list"></div></div></div></div>`;
    const today = new Date(); const currentDay = today.getDate();
    let q1=[], q2=[], q3=[], q4=[];
    tasks.filter(t => !t.done).forEach(t => {
      let urgent = false; if (t.priority === 'urgent') urgent = true; if (t.day && parseInt(t.day, 10) <= currentDay) urgent = true; if (t.due && t.due.toLowerCase().includes('today')) urgent = true;
      let important = false; if (t.project && t.project !== 'inbox') important = true; if (t.subtasks && t.subtasks.length > 0) important = true;
      const tL = (t.title || '').toLowerCase(); if (tL.includes('important') || tL.includes('critical') || tL.includes('exam') || tL.includes('test') || tL.includes('deadline')) important = true;

    [q1, q2, q3, q4].forEach((arr, i) => {

        arr.forEach((tk, idx) => {
          const globalIndex = tasks.indexOf(tk); const div = document.createElement('div'); div.className = 'item-card'; div.style.padding = '8px 12px'; div.onclick = () => openEditTask(globalIndex); div.style.animation = 'fadeSlideIn 0.3s ease forwards'; div.style.opacity = '0'; div.style.animationDelay = (idx * 0.03) + 's';
          div.innerHTML = `<div class="item-content"><div class="item-title" style="font-size: 12px;">${escapeHtml(tk.title)}</div>${tk.due ? `<div class="item-meta" style="font-size: 10px;">${escapeHtml(tk.due)}</div>` : ''}</div><div class="delete-btn" style="top: 8px; right: 8px;">✕</div>`;

        });
      }
    });

  } else if (currentView === 'pages') {
    if (!currentPageId) {
      content.innerHTML = `<div class="full-width-container"><div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px;"><div class="view-header" style="margin: 0; border: none; padding: 0;">PAGES</div><button class="btn-primary" id="btn-new-page">+ New Page</button></div><div class="page-grid" id="page-grid"></div></div>`;
      document.getElementById('btn-new-page').onclick = () => { const id = crypto.randomUUID(); pages.push({ id, title: "", icon: "📄", createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(), blocks: [] }); savePages(); currentPageId = id; renderView(); };
      const grid = document.getElementById('page-grid');
      pages.forEach((p, i) => {
        const d = document.createElement('div'); d.className = 'page-card'; d.style.animation = 'fadeSlideIn 0.3s ease forwards'; d.style.opacity = '0'; d.style.animationDelay = (i * 0.05) + 's';

        const delBtn = d.querySelector('.page-del-btn');

      });

    } else {
      const page = pages.find(p => p.id === currentPageId); if (!page) { currentPageId = null; renderView(); return; }
      const dateStr = new Date(page.updatedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      content.innerHTML = `
        <div style="display: flex; flex-direction: column; width: 100%; height: 100%; background: transparent;">
          <div style="padding: 16px 24px; border-bottom: 1px solid var(--border);"><button class="btn-outline" id="btn-back-pages" style="border: none;">← Pages</button></div>
          <div class="page-editor" id="page-editor"><button class="page-icon-btn" id="page-icon-btn">${page.icon}</button><div id="emoji-picker-container" style="position: relative;"></div><div class="page-title-input" id="page-title" contenteditable="true" data-placeholder="Untitled">${escapeHtml(page.title)}</div><div class="page-meta">Last updated ${dateStr}</div><div id="page-blocks-container" style="display: flex; flex-direction: column; width: 100%;"></div></div>

      const iconBtn = document.getElementById('page-icon-btn');

        cont.querySelectorAll('.emoji-option').forEach(el => { el.onclick = (ev) => { ev.stopPropagation(); page.icon = el.textContent; iconBtn.textContent = page.icon; cont.innerHTML = ''; triggerPageAutosave(); }; });

          else if (b.type === 'callout') inner = `<div class="block-content block-callout" contenteditable="true" data-placeholder="Callout">${c}</div>`;
          else if (b.type === 'code') inner = `<div class="block-content block-code" contenteditable="true" data-placeholder="Code">${c}</div>`;
          else if (b.type === 'divider') inner = `<div class="block-divider"></div>`;
          else if (b.type === 'todo') { inner = `<div class="block-todo-row"><div class="block-checkbox ${b.checked ? 'checked' : ''}"></div><div class="block-content block-text ${b.checked ? 'todo-done' : ''}" contenteditable="true" data-placeholder="To-do">${c}</div></div>`; }
          
          div.innerHTML = `<div class="block-drag">⋮⋮</div>${inner}<div class="block-delete" title="Delete block">✕</div>`;
          if (b.type === 'todo') { const chk = div.querySelector('.block-checkbox'); chk.onclick = () => { b.checked = !b.checked; if (b.checked) { chk.classList.add('checked'); div.querySelector('.block-content').classList.add('todo-done'); const ripple = document.createElement('div'); ripple.className = 'checkbox-ripple'; chk.appendChild(ripple); } else { chk.classList.remove('checked'); div.querySelector('.block-content').classList.remove('todo-done'); } triggerPageAutosave(); }; }
          div.querySelector('.block-delete').onclick = () => { page.blocks = page.blocks.filter(x => x.id !== b.id); renderBlocks(); triggerPageAutosave(); };
          blocksCont.appendChild(div);
        });
        blocksCont.querySelectorAll('.block-content').forEach(el => { el.addEventListener('input', triggerPageAutosave); });
      }
      renderBlocks(); document.getElementById('page-title').addEventListener('input', triggerPageAutosave);
      document.querySelectorAll('.block-type-btn').forEach(btn => { btn.onclick = () => { page.blocks.push({ id: crypto.randomUUID(), type: btn.getAttribute('data-type'), content: '', checked: false }); renderBlocks(); triggerPageAutosave(); const contents = blocksCont.querySelectorAll('.block-content'); if (contents.length > 0) contents[contents.length - 1].focus(); }; });
    }
  }

function openSettings() {
  document.getElementById('settings-content').innerHTML = buildSettingsHTML();
  document.getElementById('settings-overlay').classList.add('show');
  setupWorkspaceInteractions();
}

function buildSettingsHTML() {
  let googleHtml = '';

  document.getElementById('edit-modal-body').innerHTML = `<div class="modal-field"><div class="modal-label">Title</div><input type="text" id="edit-task-title" class="modal-input" value="${escapeHtml(editingDraft.title || '')}"></div><div class="modal-field"><div class="modal-label">Due Date</div><input type="text" id="edit-task-due" class="modal-input" value="${escapeHtml(editingDraft.due || '')}"></div><div class="modal-field"><div class="modal-label">Project</div><select id="edit-task-project" class="modal-select">${projectsHtml}</select></div><div class="modal-field"><div class="modal-label">Priority</div><select id="edit-task-priority" class="modal-select"><option value="normal" ${editingDraft.priority !== 'urgent' ? 'selected' : ''}>Normal</option><option value="urgent" ${editingDraft.priority === 'urgent' ? 'selected' : ''}>Urgent</option></select></div><div class="modal-field"><div class="modal-label">Recurrence</div><select id="edit-task-recurrence" class="modal-select"><option value="none" ${(editingDraft.recurrence === 'none' || !editingDraft.recurrence) ? 'selected' : ''}>None</option><option value="daily" ${editingDraft.recurrence === 'daily' ? 'selected' : ''}>Daily</option><option value="weekly" ${editingDraft.recurrence === 'weekly' ? 'selected' : ''}>Weekly</option><option value="monthly" ${editingDraft.recurrence === 'monthly' ? 'selected' : ''}>Monthly</option></select></div><label class="modal-checkbox-row" style="margin-top: 4px;"><input type="checkbox" id="edit-task-done" ${editingDraft.done ? 'checked' : ''}><span>Done</span></label><div class="workspace-divider" style="margin: 8px 0;"></div><div class="modal-field"><div class="modal-label">Subtasks</div><div class="subtasks-list">${subtasksHtml}</div><div style="display: flex; gap: 8px; margin-top: 8px;"><input type="text" id="new-subtask-title" class="modal-input" placeholder="New subtask..."><button class="btn-primary" id="btn-add-subtask">Add</button></div></div>`;
  document.querySelectorAll('.subtask-check').forEach(el => { el.onchange = (e) => { const idx = e.target.getAttribute('data-idx'); editingDraft.subtasks[idx].done = e.target.checked; updateDraftFromInputs(); renderTaskModal(); }; });
  document.querySelectorAll('.st-del').forEach(el => { el.onclick = (e) => { const idx = e.target.getAttribute('data-idx'); editingDraft.subtasks.splice(idx, 1); updateDraftFromInputs(); renderTaskModal(); }; });
  document.getElementById('btn-add-subtask').onclick = () => { const val = document.getElementById('new-subtask-title').value.trim(); if (val) { updateDraftFromInputs(); editingDraft.subtasks.push({ title: val, done: false }); renderTaskModal(); } };

function updateDraftFromInputs() {
  editingDraft.title = document.getElementById('edit-task-title').value; editingDraft.due = document.getElementById('edit-task-due').value; editingDraft.priority = document.getElementById('edit-task-priority').value; editingDraft.project = document.getElementById('edit-task-project').value; editingDraft.recurrence = document.getElementById('edit-task-recurrence').value; editingDraft.done = document.getElementById('edit-task-done').checked;
}

function openEditTask(index) { editingType = 'task'; editingIndex = index; editingDraft = JSON.parse(JSON.stringify(tasks[index])); if (!editingDraft.subtasks) editingDraft.subtasks = []; if (!editingDraft.project) editingDraft.project = 'inbox'; renderTaskModal(); }

function openEditEvent(index) {
  editingType = 'event'; editingIndex = index; const ev = events[index];
  let tagsOptions = ['test', 'homework', 'school', 'extracurricular', 'work', 'event'].map(t => `<option value="${t}" ${ev.tag === t ? 'selected' : ''}>${t}</option>`).join('');
  customTags.forEach(ct => { tagsOptions += `<option value="${ct.name}" ${ev.tag === ct.name ? 'selected' : ''}>${escapeHtml(ct.name)}</option>`; });
  
  let syncBtnHtml = ''; if (googleConnected) { syncBtnHtml = `<button class="btn-outline" id="btn-sync-google" style="margin-top: 8px; width: 100%; border-color: #4285F4; color: #4285F4;">Sync to Google Calendar</button>`; }
  document.getElementById('edit-modal-header').textContent = 'Edit Event';
  document.getElementById('edit-modal-body').innerHTML = `<div class="modal-field"><div class="modal-label">Title</div><input type="text" id="edit-event-title" class="modal-input" value="${escapeHtml(ev.title || '')}"></div><div class="modal-field"><div class="modal-label">Time</div><input type="text" id="edit-event-time" class="modal-input" value="${escapeHtml(ev.time || '')}"></div><div class="modal-field"><div class="modal-label">Day</div><input type="number" id="edit-event-day" class="modal-input" value="${ev.day || ''}"></div><div class="modal-field"><div class="modal-label">Tag</div><select id="edit-event-tag" class="modal-select">${tagsOptions}</select></div>${syncBtnHtml}`;
  ui.editModalOverlay.classList.add('show');
  if (googleConnected) { document.getElementById('btn-sync-google').onclick = () => syncEventToGoogle(ev); }
}

async function syncEventToGoogle(ev) {
  if (!googleConnected) return;
  try {
    const dateStr = ev.day ? new Date().getFullYear() + '-' + String(new Date().getMonth() + 1).padStart(2,'0') + '-' + String(ev.day).padStart(2,'0') : null;
    if (!dateStr) { showPill('Add a day to sync'); return; }
    const res = await fetch(BACKEND_URL + '/calendar/events', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-token': API_TOKEN }, body: JSON.stringify({ title: ev.title, date: dateStr, time: ev.time || null, description: ev.tag ? 'Tag: ' + ev.tag : null, reminder_minutes: 30 }) });
    const data = await res.json(); if (data.success) { showPill('Synced to Google Calendar'); fetchGoogleEvents(); closeEditModal(); }
  } catch (e) { showPill('Could not sync to Google'); }
}

function closeEditModal() { ui.editModalOverlay.classList.remove('show'); editingType = null; editingIndex = -1; editingDraft = null; }
ui.editModalCancel.onclick = closeEditModal; ui.editModalOverlay.onclick = (e) => { if (e.target === ui.editModalOverlay) closeEditModal(); };

ui.editModalSave.onclick = () => {
  if (editingType === 'task' && editingIndex >= 0) { updateDraftFromInputs(); tasks[editingIndex] = editingDraft; } 
  else if (editingType === 'event' && editingIndex >= 0) {
    events[editingIndex].title = document.getElementById('edit-event-title').value; events[editingIndex].time = document.getElementById('edit-event-time').value;
    const d = document.getElementById('edit-event-day').value; events[editingIndex].day = d ? parseInt(d, 10) : null; events[editingIndex].tag = document.getElementById('edit-event-tag').value;
  }
  saveState(); renderView(); closeEditModal();
};

async function submitInput() {
  const val = ui.inputArea.value.trim(); if (!val) return;
  ui.inputArea.value = ''; ui.submitBtn.disabled = true; showPill("Agent is parsing..."); updateAgent("Parsing input...");
  document.getElementById('input-bar').classList.add('submitting');
  setTimeout(() => { document.getElementById('input-bar').classList.remove('submitting'); }, 600);
  
  try {
    const res = await fetch(BACKEND_URL + "/parse", { method: "POST", headers: { "Content-Type": "application/json", "x-api-token": API_TOKEN }, body: JSON.stringify({ text: val }) });
    if (!res.ok) throw new Error("Backend error");
    const data = await res.json();
    if (data.success) {
      const type = data.data?.type; const item = data.data;
      if (type === 'event') { events.push(item); updateAgent(`Added to calendar: ${item.title || 'event'}`); showPill(`Added to calendar${item.day ? ' — Day ' + item.day : ''}`); } 
      else if (type === 'task') { item.project = 'inbox'; tasks.push(item); updateAgent(`Added task: ${item.title || 'task'}`); showPill(`Added to tasks`); }
      saveState(); renderView();
    } else throw new Error("Unsuccessful parse");
  } catch (err) { showPill("Could not understand that — try again"); updateAgent("Ready"); }
  ui.submitBtn.disabled = false; ui.inputArea.focus();
}

ui.submitBtn.onclick = submitInput;

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim(); if (!q) { searchResults.innerHTML = ''; return; } let html = '';
  const evMatch = events.map((e,i) => ({e,i})).filter(x => (x.e.title && x.e.title.toLowerCase().includes(q)) || (x.e.tag && x.e.tag.toLowerCase().includes(q)) || (x.e.location && x.e.location.toLowerCase().includes(q))).slice(0,5);
  if (evMatch.length > 0) { html += '<div class="search-group-header">EVENTS</div>'; evMatch.forEach(x => { html += `<div class="search-result-item" onclick="closeSearch(); openEditEvent(${x.i});"><div class="search-result-title">${escapeHtml(x.e.title)}</div><div class="search-result-meta">${x.e.day ? `Day ${x.e.day}` : ''} • ${x.e.tag}</div></div>`; }); }
  const tkMatch = tasks.map((t,i) => ({t,i})).filter(x => (x.t.title && x.t.title.toLowerCase().includes(q)) || (x.t.due && x.t.due.toLowerCase().includes(q)) || (x.t.project && projects.find(p => p.id === x.t.project)?.name.toLowerCase().includes(q))).slice(0,5);
  if (tkMatch.length > 0) { html += '<div class="search-group-header">TASKS</div>'; tkMatch.forEach(x => { const pName = projects.find(p => p.id === (x.t.project||'inbox'))?.name || 'Inbox'; html += `<div class="search-result-item" onclick="closeSearch(); openEditTask(${x.i});"><div class="search-result-title">${escapeHtml(x.t.title)}</div><div class="search-result-meta">${x.t.done ? 'Done' : 'Pending'} • ${pName}</div></div>`; }); }
  const hbMatch = habits.filter(h => h.name.toLowerCase().includes(q)).slice(0,5);
  if (hbMatch.length > 0) { html += '<div class="search-group-header">HABITS</div>'; hbMatch.forEach(h => { html += `<div class="search-result-item" onclick="closeSearch(); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.querySelector('.nav-item[data-view=habits]').classList.add('active'); navigateTo('habits');"><div class="search-result-title">${escapeHtml(h.name)}</div><div class="search-result-meta">🔥 ${h.streak} streak • ${h.frequency}</div></div>`; }); }
  if (!html) html = '<div class="search-no-results">No results found</div>'; searchResults.innerHTML = html;
});

async function checkGoogleAuthStatus() {
  try {
    const res = await fetch(BACKEND_URL + "/auth/status", { headers: { "x-api-token": API_TOKEN } });
    const data = await res.json();
    googleConnected = data.connected;
    if (googleConnected) fetchGoogleEvents();
  } catch (e) { googleConnected = false; }
}

async function fetchGoogleEvents() {
  try {
    const res = await fetch(BACKEND_URL + "/calendar/events", { headers: { "x-api-token": API_TOKEN } });
    const data = await res.json();
    if (data.success) { googleEvents = data.events; renderView(); }
  } catch (e) { googleEvents = []; }
}

const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get("google_auth") === "success") { showPill("Google Calendar connected"); googleConnected = true; fetchGoogleEvents(); window.history.replaceState({}, document.title, window.location.pathname); } 
else if (urlParams.get("google_auth") === "error") { showPill("Google connection failed — try again"); window.history.replaceState({}, document.title, window.location.pathname); }

renderView();
checkGoogleAuthStatus();

(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const P = [];
  for (let i = 0; i < 60; i++) {
    P.push({ x: Math.random()*W, y: Math.random()*H, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, r: Math.random()*1.5+0.5, pulse: Math.random()*Math.PI*2, ps: 0.02+Math.random()*0.01 });
  }

  const ORBS = Array.from({length:5}, (_,i) => ({ x: Math.random()*W, y: Math.random()*H, r: 180+Math.random()*220, vx: (Math.random()-0.5)*0.18, vy: (Math.random()-0.5)*0.18, phase: i/5*Math.PI*2 }));

  const HEXS = Array.from({length:5}, () => ({ x: Math.random()*W, y: Math.random()*H, size: 40+Math.random()*70, rot: Math.random()*Math.PI, vrot: (Math.random()-0.5)*0.005, vx: (Math.random()-0.5)*0.12, vy: (Math.random()-0.5)*0.12, op: 0.04+Math.random()*0.05 }));

  let frame=0, pulseR=0, pulseA=0, pulseOn=false;

  function hexPath(cx,cy,sz,rot) {
    ctx.beginPath();
    for (let i=0;i<6;i++) { const a=rot+i*Math.PI/3; const px=cx+sz*Math.cos(a); const py=cy+sz*Math.sin(a); i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
    ctx.closePath();
  }

  function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0,0,W,H);
    frame++;

    const gs=80, t=frame*0.005;
    ctx.lineWidth=0.3;
    for (let x=0;x<=W;x+=gs) { ctx.strokeStyle=`rgba(168,85,247,${0.04+0.015*Math.sin(t+x*0.01)})`; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y=0;y<=H;y+=gs) { ctx.strokeStyle=`rgba(168,85,247,${0.04+0.015*Math.sin(t+y*0.01)})`; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    ORBS.forEach(o => {
      o.x+=o.vx; o.y+=o.vy; o.phase+=0.008;
      if(o.x<-o.r)o.x=W+o.r; if(o.x>W+o.r)o.x=-o.r;
      if(o.y<-o.r)o.y=H+o.r; if(o.y>H+o.r)o.y=-o.r;
      const a=0.05+0.02*Math.sin(o.phase);
      const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,`rgba(168,85,247,${a*2})`); g.addColorStop(0.5,`rgba(124,58,237,${a})`); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
    });

    HEXS.forEach(h => {
      h.rot+=h.vrot; h.x+=h.vx; h.y+=h.vy;
      if(h.x<-120)h.x=W+120; if(h.x>W+120)h.x=-120;
      if(h.y<-120)h.y=H+120; if(h.y>H+120)h.y=-120;
      hexPath(h.x,h.y,h.size,h.rot); ctx.strokeStyle=`rgba(168,85,247,${h.op*2})`; ctx.lineWidth=1; ctx.stroke();
      hexPath(h.x,h.y,h.size*0.65,h.rot+0.3); ctx.strokeStyle=`rgba(192,132,252,${h.op})`; ctx.stroke();
    });

    P.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.pulse+=p.ps;
      if(p.x<0||p.x>W)p.vx*=-1; if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(168,85,247,${0.3+Math.sin(p.pulse)*0.2})`; ctx.fill();
    });

    for (let i=0;i<P.length;i++) for (let j=i+1;j<P.length;j++) {
      const dx=P[i].x-P[j].x, dy=P[i].y-P[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<120) { ctx.beginPath(); ctx.moveTo(P[i].x,P[i].y); ctx.lineTo(P[j].x,P[j].y); ctx.strokeStyle=`rgba(168,85,247,${(1-d/120)*0.1})`; ctx.lineWidth=0.5; ctx.stroke(); }
    }

    if(frame%200===0){pulseOn=true;pulseR=0;pulseA=0.25;}
    if(pulseOn){
      pulseR+=5; pulseA-=0.004;
      if(pulseA<=0){pulseOn=false;}
      else {
        const pg=ctx.createRadialGradient(W/2,H/2,Math.max(0,pulseR-30),W/2,H/2,pulseR);
        pg.addColorStop(0,'rgba(168,85,247,0)'); pg.addColorStop(0.5,`rgba(168,85,247,${pulseA})`); pg.addColorStop(1,'rgba(168,85,247,0)');
        ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(W/2,H/2,pulseR,0,Math.PI*2); ctx.fill();
      }
    }

    if(frame%180===90){
      const a=P[Math.floor(Math.random()*P.length)], b=P[Math.floor(Math.random()*P.length)];
      const mx=(a.x+b.x)/2+(Math.random()-0.5)*120, my=(a.y+b.y)/2+(Math.random()-0.5)*120;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(mx,my,b.x,b.y);
      ctx.strokeStyle='rgba(192,132,252,0.35)'; ctx.lineWidth=1; ctx.stroke();
    }
  }
  animate();
})();

document.addEventListener('mousemove', (e) => {
  const cards = document.querySelectorAll('.item-card, .page-card, .habit-card');
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) / rect.width;
    const dy = (e.clientY - cy) / rect.height;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 1.2) {
      const rx = dy * 6;
      const ry = -dx * 6;
      card.style.transform = `perspective(600px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-2px)`;
      card.style.transition = 'transform 0.1s ease';
    } else {
      card.style.transform = '';
      card.style.transition = 'transform 0.3s ease';
    }
  });
});

function setupTopNav() {
  document.querySelectorAll('.nav-group-trigger').forEach(trigger => {
    trigger.onclick = function(e) {
      e.stopPropagation();
      const group = this.getAttribute('data-group');
      const navGroup = document.getElementById('ng-' + group);
      const isOpen = navGroup.classList.contains('open');
      document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
      if (!isOpen) navGroup.classList.add('open');
    };
  });

  document.querySelectorAll('.nav-dd-item').forEach(el => {
    el.onclick = function(e) {
      e.stopPropagation();
      document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
      const view = this.getAttribute('data-view');
      if (view) navigateTo(view);
    };
  });

  document.addEventListener('click', function() {
    document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
  });

  document.getElementById('nav-brand').onclick = function() { navigateTo('home'); };
  document.getElementById('nav-settings-btn').onclick = function() {
    document.getElementById('settings-content').innerHTML = buildSettingsHTML();
    document.getElementById('settings-overlay').classList.add('show');
    setupWorkspaceInteractions();
  };
}
setupTopNav();

document.querySelectorAll('.btn-primary, .home-cta, #submit-btn').forEach(btn => {
  btn.addEventListener('mousedown', function() {
    this.style.boxShadow = '0 0 0 4px rgba(168,85,247,0.2), 0 4px 20px rgba(124,58,237,0.4)';

  });
});
